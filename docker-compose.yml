services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - NAPSTER_API_KEY=${NAPSTER_API_KEY}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - PORT=3001
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - BUSINESS_OWNER_PHONE=${BUSINESS_OWNER_PHONE:-}
    volumes:
      - localdesk_data:/app/data
      - ./.agent-config.json:/app/.agent-config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  localdesk_data:
